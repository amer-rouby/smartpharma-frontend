<div class="confirm-dialog-container">

  <div class="dialog-header">
    <div class="icon-wrapper">
      <mat-icon>report_problem</mat-icon>
    </div>
  </div>

  <div class="dialog-content">
    <h2 mat-dialog-title>{{data.title || 'تأكيد الإجراء'}}</h2>
    <p>{{data.message || 'هل أنت متأكد من تنفيذ هذه العملية؟ لا يمكن التراجع عنها.'}}</p>
  </div>

  <div class="dialog-actions">
    <button mat-button class="cancel-btn" (click)="onCancel()">
      {{data.cancelText || 'إلغاء'}}
    </button>
    <button mat-raised-button class="confirm-btn" (click)="onConfirm()">
      {{data.confirmText || 'نعم، حذف'}}
    </button>
  </div>

</div>
